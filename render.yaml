services:
  - type: web
    name: theholestudio
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn feedback_website.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: theholestudio-db
          property: connectionString

databases:
  - name: theholestudio-db
    databaseName: theholestudio
    user: theholestudio
