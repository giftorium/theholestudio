<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Amir Parsa — Light Designer & Curator{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #242424;
      --text: #f0ede8;
      --muted: #999;
      --accent: #c9a96e;
      --display: 'Cormorant Garamond', serif;
      --body: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 3rem;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    nav.scrolled { border-color: var(--border); }
    .nav-logo {
      font-family: var(--display);
      font-size: 1rem; font-weight: 400; letter-spacing: 0.12em;
      text-decoration: none; color: var(--text);
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }

    /* ── SHARED ── */
    .section-label {
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 3rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .section-label::after { content: ''; display: block; width: 2.5rem; height: 1px; background: var(--accent); opacity: 0.5; }

    .btn {
      display: inline-block; padding: 0.9rem 3rem;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); font-family: var(--body); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: all 0.25s;
    }
    .btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── FOOTER ── */
    footer {
      padding: 2.5rem 3rem; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      color: var(--muted); font-size: 0.7rem; letter-spacing: 0.1em;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
      background: var(--surface); border: 1px solid var(--accent);
      color: var(--accent); padding: 1rem 1.5rem;
      font-size: 0.75rem; letter-spacing: 0.1em;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.96); z-index: 200;
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      color: var(--muted); font-size: 1.8rem; background: none; border: none;
      cursor: pointer; line-height: 1; transition: color 0.2s;
    }
    .lightbox-close:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.25rem 1.5rem; }
      .nav-links { display: none; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<nav id="nav">
  <a href="/" class="nav-logo">Amir Parsa</a>
  <ul class="nav-links">
    <li><a href="/" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a></li>
    <li><a href="/feedback/" {% if request.resolver_match.url_name == 'feedback' %}class="active"{% endif %}>Feedback</a></li>
    <li><a href="/contact/" {% if request.resolver_match.url_name == 'contact' %}class="active"{% endif %}>Contact</a></li>
  </ul>
</nav>

{% if messages %}
  {% for msg in messages %}
    <div class="toast">{{ msg }}</div>
  {% endfor %}
{% endif %}

{% block content %}{% endblock %}

<footer>
  <span>Amir Parsa</span>
  <span>Light Designer &amp; Curator</span>
  <span>&copy; {% now "Y" %}</span>
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
  });
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 4000);
</script>

</body>
</html>
