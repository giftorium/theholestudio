<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Hole Studio{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ed;
      --surface: #eae8e2;
      --border: #ccc9c0;
      --text: #141410;
      --muted: #6e6b60;
      --ink: #1a1a14;
      --accent: #9DD2A3;
      --accent-dim: rgba(157,210,163,0.18);
      --accent2: #C4856A;
      --accent2-dim: rgba(196,133,106,0.15);
      --display: 'Cormorant Garamond', serif;
      --body: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 2.5rem;
      background: rgba(244,242,237,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--display);
      font-size: 1.15rem; font-weight: 400; letter-spacing: 0.04em;
      text-decoration: none; color: var(--text);
      display: flex; align-items: center; gap: 0.4em;
    }
    .nav-logo em { font-style: italic; font-weight: 300; }
    .nav-logo img { height: 32px; width: auto; display: block; }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; align-items: center; }
    .nav-links a {
      font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); border-bottom: 1.5px solid var(--accent); padding-bottom: 1px; }

    /* ── SHARED ── */
    .section-label {
      font-size: 0.58rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.9rem;
    }
    .section-label::before { content: ''; display: block; width: 1.8rem; height: 1px; background: var(--accent); }

    .btn {
      display: inline-block; padding: 0.9rem 3rem;
      border: 1px solid var(--text); background: transparent;
      color: var(--text); font-family: var(--body); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: all 0.25s;
    }
    .btn:hover { background: var(--text); color: var(--bg); }

    .btn-inv {
      display: inline-block; padding: 0.9rem 3rem;
      border: 1px solid rgba(244,242,237,0.4); background: transparent;
      color: var(--bg); font-family: var(--body); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: all 0.25s;
    }
    .btn-inv:hover { background: var(--bg); color: var(--ink); }

    .btn-ghost {
      display: inline-block; padding: 0.9rem 3rem;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: var(--body); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: all 0.25s;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    /* ── FOOTER ── */
    footer {
      background: var(--ink); color: rgba(244,242,237,0.5);
      padding: 3rem 2.5rem;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center;
      font-size: 0.68rem; letter-spacing: 0.1em;
    }
    .footer-logo {
      font-family: var(--display); font-size: 1.1rem; font-weight: 300;
      color: rgba(244,242,237,0.9); letter-spacing: 0.04em;
    }
    .footer-center { text-align: center; }
    .footer-right { text-align: right; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
      background: var(--ink); color: var(--bg);
      padding: 1rem 1.5rem;
      font-size: 0.75rem; letter-spacing: 0.1em;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(20,20,16,0.97); z-index: 200;
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      color: rgba(244,242,237,0.4); font-size: 1.8rem; background: none; border: none;
      cursor: pointer; line-height: 1; transition: color 0.2s;
    }
    .lightbox-close:hover { color: var(--bg); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.1rem 1.5rem; }
      .nav-links { gap: 1.5rem; }

      footer { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .footer-center { display: none; }
    }
    @media (max-width: 600px) {
      .nav-links { display: none; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<nav id="nav">
  <a href="/" class="nav-logo">
    {% if site_settings.logo %}
      <img src="{{ site_settings.logo.url }}" alt="the– hOle –studio">
    {% else %}
      The Hole <em>Studio</em>
    {% endif %}
  </a>
  <ul class="nav-links">
    <li><a href="/" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a></li>
    <li><a href="/productions/" {% if request.resolver_match.url_name == 'productions' or request.resolver_match.url_name == 'production_detail' %}class="active"{% endif %}>Productions</a></li>
    <li><a href="/about/" {% if request.resolver_match.url_name == 'about' %}class="active"{% endif %}>About</a></li>
    <li><a href="/contact/" {% if request.resolver_match.url_name == 'contact' %}class="active"{% endif %}>Contact</a></li>
  </ul>
</nav>

{% if messages %}
  {% for msg in messages %}
    <div class="toast">{{ msg }}</div>
  {% endfor %}
{% endif %}

{% block content %}{% endblock %}

<footer>
  <span class="footer-logo">The Hole Studio</span>
  <span class="footer-center">Contemporary Dance &amp; Theatre</span>
  <span class="footer-right">Toronto &mdash; &copy; {% now "Y" %}</span>
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 4000);
</script>

</body>
</html>
